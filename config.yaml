defaults:
  keywords:
    - "AI"
    - "LLM"
    - "startup"
    - "open source"
  source: "hackernews" # or "reddit"
  limit: 50

llm:
  apiKey: ""          # 覆盖 OPENAI_API_KEY（可留空，优先读环境变量）
  baseUrl: ""         # 覆盖 OPENAI_BASE_URL
  model: "kimi-k2.5"  # 覆盖 OPENAI_MODEL

schedule:
  enabled: false
  cronDaily: "0 9 * * *"   # 每天 09:00
  cronWeekly: "0 10 * * 1" # 每周一 10:00

notifications:
  email:
    from: ""
    to: ""
    # 二选一：SMTP 或 Resend
    smtp:
      host: ""
      port: 587
      secure: false
      user: ""
      pass: ""
    resendApiKey: "" # 如果填写则优先使用 Resend

quickChart:
  enabled: true
  baseUrl: "https://quickchart.io/chart"
  width: 800
  height: 400
  theme: "light"

storage:
  historyDir: "./data/history"

